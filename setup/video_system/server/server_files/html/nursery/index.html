<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nursery Call</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }

        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 30px;
            text-align: center;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            color: #555;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        input::placeholder {
            color: #aaa;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            margin-top: 20px;
            padding: 16px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.6;
            display: none;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .message strong {
            display: block;
            margin-bottom: 4px;
        }

        .hidden {
            display: none !important;
        }

        .result-container {
            display: none;
            text-align: center;
        }

        .result-container.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        .result-message {
            padding: 24px;
            border-radius: 12px;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .result-message.success {
            background: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
        }

        .result-message.error {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
        }

        .action-button {
            width: 100%;
            padding: 14px;
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-button:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .action-button:active {
            transform: translateY(0);
        }

        .hidden-option {
            margin-top: 12px;
            font-size: 11px;
            color: #999;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            user-select: none;
        }

        .hidden-option input[type="checkbox"] {
            width: auto;
            margin: 0;
            cursor: pointer;
        }

        .hidden-option:hover {
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Nursery Call</h1>
        <form id="callForm">
            <div class="form-group">
                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    required
                    placeholder="Enter password"
                    autocomplete="current-password"
                >
            </div>
            <div class="form-group">
                <label for="code">Code</label>
                <input
                    type="text"
                    id="code"
                    name="code"
                    required
                    maxlength="10"
                    placeholder="Max 10 characters"
                    pattern=".{1,10}"
                    autocomplete="off"
                >
                <label class="hidden-option">
                    <input type="checkbox" id="noEmoji" name="noEmoji">
                    Avoid adding child emoji
                </label>
            </div>
            <button type="submit">Submit</button>
        </form>
        <div id="resultContainer" class="result-container">
            <div id="resultMessage" class="result-message"></div>
            <button id="actionButton" class="action-button"></button>
        </div>
    </div>

    <script>
        const form = document.getElementById('callForm');
        const passwordInput = document.getElementById('password');
        const codeInput = document.getElementById('code');
        const noEmojiCheckbox = document.getElementById('noEmoji');
        const submitButton = form.querySelector('button[type="submit"]');
        const resultContainer = document.getElementById('resultContainer');
        const resultMessage = document.getElementById('resultMessage');
        const actionButton = document.getElementById('actionButton');

        // Load password from localStorage on page load
        window.addEventListener('DOMContentLoaded', () => {
            const savedPassword = localStorage.getItem('nurserycall_password');
            if (savedPassword) {
                passwordInput.value = savedPassword;
            }
        });

        // Save password to localStorage whenever it changes
        passwordInput.addEventListener('input', () => {
            localStorage.setItem('nurserycall_password', passwordInput.value);
        });

        function showResult(type, message) {
            // Hide form
            form.classList.add('hidden');

            // Show result
            resultMessage.textContent = message;
            resultMessage.className = `result-message ${type}`;
            actionButton.textContent = type === 'success' ? 'Again' : 'Try Again';
            resultContainer.classList.add('show');

            // Clear code field only on success
            if (type === 'success') {
                codeInput.value = '';
            }
        }

        function resetToForm() {
            // Hide result
            resultContainer.classList.remove('show');

            // Show form
            form.classList.remove('hidden');

            // Focus on code input
            codeInput.focus();
        }

        actionButton.addEventListener('click', resetToForm);

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const password = passwordInput.value;
            let code = codeInput.value;

            if (code.length > 10) {
                showResult('error', 'Code cannot be longer than 10 characters');
                return;
            }

            // Prepend emoji unless checkbox is checked
            if (!noEmojiCheckbox.checked) {
                code = '\uD83E\uDDD2' + ' ' + code;
            }

            // Disable submit button during request
            submitButton.disabled = true;
            submitButton.textContent = 'Sending...';

            try {
                const response = await fetch('/n8n/webhook/nurserycall', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        code: code,
                        password: password
                    })
                });

                const data = await response.json();

                if (data.type === 'ok') {
                    showResult('success', data.message);
                } else {
                    showResult('error', data.message || 'An error occurred');
                }
            } catch (error) {
                showResult('error', 'Failed to submit: ' + error.message);
            } finally {
                submitButton.disabled = false;
                submitButton.textContent = 'Submit';
            }
        });
    </script>
</body>
</html>
