  companion:
    image: ghcr.io/bitfocus/companion/companion:latest
    container_name: companion
    user: "1002:100"
#    network_mode: host # Atem plugin was bugging when it was NAT-ed.
    ports:
      - "3001:8000"
      - "16622:16622"
      - "16623:16623"
      - "12000:12000/udp"
      - "28492:28492"
      - "9910-9920:9910-9920/udp"  # extra ATEM UDP ports
      - "6970-6999:6970-6999/udp"    # Discovery range (optional)
    volumes:
      - ./docker_volumes/companion:/companion
    restart: unless-stopped
    deploy:
      resources:
        limits:
          # Hard memory limit - container killed if exceeded
          memory: 4G
    environment:
      - TZ=${TZ}
      - COMPANION_PORT=3001
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    networks:
      - ccp_network
