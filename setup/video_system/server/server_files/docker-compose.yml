  video-processor:
    build:
      context: .
      dockerfile: Dockerfile
    image: ccp-av-base
    container_name: video-processor
    networks:
      ccp_network:
    environment:
      - TZ=Europe/Nicosia
      - SHORTS_WEBHOOK_URL=${SHORTS_WEBHOOK_URL}
      - SHORTS_BASE_PATH=/mnt
    command: >
      bash -c '
      while true; do
        sleep $$((60 - $$(date +%S)));
        if [ "$$(date +%H%M)" = "2320" ]; then
          python /ccp_it_stuff/video_processor.py
          python3 /ccp_it_stuff/make_shorts.py
        fi;
      done'
    volumes:
      - ./:/ccp_it_stuff:ro
      - /share/production/recordings/:/mnt/
    restart: unless-stopped
    deploy:
      resources:
        limits:
          # Hard memory limit - container killed if exceeded
          memory: 4G
          cpus: 3.2 # 4 cores * 80%

  atem-nas-sync:
    build:
      context: .
      dockerfile: Dockerfile
    image: ccp-av-base
    container_name: atem-nas-sync
    network_mode: host
    privileged: true  # needed for CIFS mounts
    environment:
      - TZ=${TZ}
      - ATEM_IP=${ATEM_IP}
      - BANDWIDTH_LIMIT=${ATEM_SYNC_LIMIT}
      - SMB_SHARE=${ATEM_SMB_SHARE}
      - SMB_USER=${ATEM_SMB_USER}
      - SMB_PASS=${ATEM_SMB_PASS}
      - SMB_WORKGROUP=${ATEM_SMB_WORKGROUP}
      - NOTIFY_URL=${N8N_NOTIF_URL}
#    command: sh -c "apk add --no-cache ffmpeg bash mc nano rsync cifs-utils && sleep infinity"
    # Run sync every 5min with flock to prevent overlapping:
    command:
      - bash
      - -c
      - |
        while true; do
          flock -n /tmp/sync.lock bash -c '
            /ccp_it_stuff/sync_recordings.sh CCP_     /mnt/recordings/ccp
            /ccp_it_stuff/sync_recordings.sh CHINESE_ /mnt/recordings/chinese
          '
          sleep 60
        done
    volumes:
      - ./:/ccp_it_stuff:ro
      - /share/production/recordings/:/mnt/recordings
    stdin_open: true
    tty: true
    restart: unless-stopped
    deploy:
      resources:
        limits:
          # Hard memory limit - container killed if exceeded
          memory: 4G

  reverse_proxy_webserver:
    dns:
      - 192.168.2.1
    networks:
      ccp_network:
      qnet_lan2:
        ipv4_address: 192.168.2.10
    image: caddy:alpine
    container_name: reverse_proxy_webserver
    ports:
      - "8989:80"
      - "4343:443"
    volumes:
      - /share/production/ccp_it_stuff/html/remote:/var/www/remote:ro
      - /share/production/ccp_it_stuff/html/nursery:/var/www/nursery:ro
      - /share/production/ccp_it_stuff/html/reborn:/var/www/reborn:ro
      - /share/production/ccp_it_stuff/html/default:/var/www/default:ro
      - caddy_data:/data
      - caddy_config:/config
    command: |
      sh -c "cat > /etc/caddy/Caddyfile << 'EOF'
      {
        debug
      }

      192.168.2.10 {
        tls internal

        log {
          output stdout
          format console
          level DEBUG
        }

        handle_path /remote* {
          root * /var/www/remote
          file_server
        }

        handle_path /nursery* {
          root * /var/www/nursery
          file_server
        }

    

        handle_path /reborn* {
          root * /var/www/reborn
          file_server
        }
      
        handle_path /n8n/* {
          reverse_proxy n8n:5678
        }
        handle {
          root * /var/www/default
          file_server
        }
      }
      EOF
      caddy run --config /etc/caddy/Caddyfile --adapter caddyfile"
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:

networks:
  ccp_network:
    driver: bridge
  qnet_lan2:
    driver: qnet
    driver_opts:
      iface: "eth1"
    ipam:
      driver: qnet
      options:
        iface: "eth1"
      config:
        - subnet: 192.168.2.0/24
          gateway: 192.168.2.1

