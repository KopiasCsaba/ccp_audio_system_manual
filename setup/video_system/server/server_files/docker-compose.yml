  restreamer:
    image: datarhei/restreamer:latest
    container_name: restreamer
    ports:
      - "3002:8080"    # Web UI
      - "1935:1935"    # RTMP
      - "6000:6000/udp" # SRT
    volumes:
      - ./docker_volumes/restreamer/config:/core/config
      - ./docker_volumes/restreamer/data:/core/data
    environment:
      - RS_USERNAME=${RS_USERNAME}
      - RS_PASSWORD=${RS_PASSWORD}
      - RS_TOKEN=${RS_TOKEN}
      - CORE_API_AUTH_ENABLE=false
      - CORE_LOG_LEVEL=error
      - TZ=${TZ}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          # Hard memory limit - container killed if exceeded
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/api/v3/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ccp_network

