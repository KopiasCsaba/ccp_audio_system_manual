# Simple dual-display configuration for Raspberry Pi 5
# Uses RandR extended desktop mode (not Zaphod - unsupported on Pi 5)
# Both displays appear on a single Screen 0 with 3840x1080 total resolution
# HDMI-1 at 0+0 (left), HDMI-2 at 1920+0 (right)

Section "Device"
    Identifier     "RPi5 GPU"
    Driver         "modesetting"
    Option         "kmsdev" "/dev/dri/card1"
    Option         "AccelMethod" "glamor"
EndSection

Section "ServerLayout"
    Identifier     "Default"
    Option         "BlankTime" "0"
    Option         "StandbyTime" "0"
    Option         "SuspendTime" "0"
    Option         "OffTime" "0"
EndSection
