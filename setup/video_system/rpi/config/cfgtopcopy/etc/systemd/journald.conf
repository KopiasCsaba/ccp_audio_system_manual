[Journal]
# Store journal only in RAM (required for readonly filesystem)
Storage=volatile

# Limit journal size in RAM (adjust based on available RAM)
# Default: 10% of RAM, max 4GB - we set conservative limits
RuntimeMaxUse=100M
RuntimeKeepFree=50M
RuntimeMaxFileSize=20M

# Keep only recent logs (2 hours for kiosk)
MaxRetentionSec=8h

# Compression to save RAM
Compress=yes

# Rate limiting to prevent log flooding
RateLimitIntervalSec=30s
RateLimitBurst=1000

# Forward to syslog if needed (disabled by default)
#ForwardToSyslog=yes
#ForwardToConsole=no

# Sync interval (0 = immediate, higher = less I/O pressure on RAM)
SyncIntervalSec=5min
